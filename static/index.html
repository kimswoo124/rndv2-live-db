<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products R&D Viewer</title>
<style>
@font-face{font-family:Pretendard;src:url("/dashboard-assets/fonts/PretendardVariable.woff2") format("woff2");font-weight:100 900;font-display:swap}
:root{
  --bg:#0f1115;--panel:#171b22;--panel2:#1f252e;--line:#2c333f;
  --text:#edf1f7;--muted:#9aa6b5;--sub:#667385;
  --green:#78d89b;--blue:#5aa7ff;--cyan:#67d4e8;--amber:#e8ba62;--red:#e56f6a;
  --ink:#111827;--white:#fff;
}
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Pretendard,"Apple SD Gothic Neo",sans-serif;font-size:13px;letter-spacing:0}
button,input,select{font:inherit}
button{cursor:pointer}
.app{display:grid;grid-template-columns:380px minmax(0,1fr);height:100vh;min-height:0;overflow:hidden}
.sidebar{border-right:1px solid var(--line);background:#11151b;display:flex;flex-direction:column;min-width:0;height:100vh;min-height:0;overflow:hidden}
.topbar{flex:0 0 auto;padding:16px 18px;border-bottom:1px solid var(--line)}
.title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.title h1{font-size:18px;line-height:1.2;margin:0;font-weight:850}
.mode{font-size:10px;color:var(--green);border:1px solid rgba(53,201,139,.45);background:rgba(53,201,139,.1);border-radius:999px;padding:3px 8px;font-weight:850}
.filters{display:grid;grid-template-columns:1fr 100px 82px;gap:8px}
.filters input,.filters select,.filters button{width:100%;height:34px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:7px;padding:0 10px;outline:none}
.filters input{grid-column:1/-1}
.filters input:focus,.filters select:focus,.filters button:focus{border-color:var(--blue)}
.filters button{font-weight:850;color:var(--cyan)}
.filters button:hover{border-color:var(--cyan);background:#1b222d}
.overview-toggle{margin-left:auto;color:var(--cyan)!important}
.overview-toggle.active{border-color:rgba(103,212,232,.6)!important;background:rgba(103,212,232,.12)!important;color:#f2f1ea!important}
.meta-row{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:10px}
.list{flex:1 1 auto;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.list-group{display:grid;gap:8px}
.list-group-title{position:sticky;top:-12px;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#11151b;border-bottom:1px solid rgba(255,255,255,.08);padding:7px 2px 5px;color:#c9d3df;font-size:11px;font-weight:900}
.list-group-title span:last-child{color:var(--sub);font-weight:800}
.product-card{border:1px solid var(--line);background:var(--panel);border-radius:8px;display:grid;grid-template-columns:92px minmax(0,1fr);gap:11px;padding:9px;text-align:left;color:inherit;transition:.15s;position:relative}
.product-card:hover,.product-card.active{border-color:var(--blue);background:#1b222d}
.product-card-open{position:absolute;inset:0;border:0;background:transparent;color:transparent;padding:0}
.product-card-open:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:8px}
.delete-btn{position:absolute;right:8px;bottom:8px;border:1px solid rgba(240,109,109,.42);background:rgba(240,109,109,.1);color:#f06d6d;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;z-index:2}
.delete-btn:hover{background:rgba(240,109,109,.2)}
.thumb{height:82px;border-radius:7px;background:#f7f8fb;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;z-index:2}
.thumb[data-lightbox-url]{cursor:zoom-in}
.thumb[data-lightbox-url]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.thumb img{width:100%;height:100%;object-fit:contain;display:block}
.thumb span{color:#8792a2;font-size:11px}
.card-main{min-width:0;display:flex;flex-direction:column;gap:5px}
.card-title{font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{border:1px solid var(--line);background:#151a21;color:var(--muted);border-radius:999px;padding:2px 7px;font-size:10px;font-weight:800;white-space:nowrap}
.pill.done{border-color:rgba(53,201,139,.45);color:var(--green);background:rgba(53,201,139,.09)}
.pill.warn{border-color:rgba(229,184,77,.45);color:var(--amber);background:rgba(229,184,77,.08)}
.pill.internal{border-color:rgba(103,212,232,.42);color:var(--cyan);background:rgba(103,212,232,.09)}
.pill.competitor{border-color:rgba(232,186,98,.42);color:var(--amber);background:rgba(232,186,98,.08)}
.content{min-width:0;min-height:0;height:100vh;overflow:auto}
.empty{height:100%;min-height:420px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;line-height:1.7}
.detail{max-width:1680px;margin:0 auto;padding:18px 22px 36px}
.analysis-head{border:1px solid #3a3a3a;background:#1c1d1b;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.analysis-head h2{font-size:18px;line-height:1.2;margin:0 0 6px;font-weight:950;letter-spacing:0;overflow-wrap:anywhere}
.analysis-head p{margin:0;color:#b9bab4;font-size:13px;font-weight:750}
.analysis-id-meta{margin-top:4px!important;color:#858781!important;font-size:11px!important;font-weight:650!important;overflow-wrap:anywhere}
.analysis-image-row{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:12px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.analysis-image-carousel{position:relative;margin-bottom:16px;overflow:hidden}
.analysis-image-pages{display:flex;transition:transform .22s ease;will-change:transform}
.analysis-image-page{flex:0 0 100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;min-width:0}
.analysis-image-card{border:1px solid #3c3d3a;background:#f4f4f2;border-radius:8px;overflow:hidden;min-height:170px;cursor:zoom-in;transition:border-color .15s,transform .15s}
.analysis-image-card:hover{border-color:#5aa7ff;transform:translateY(-1px)}
.analysis-image-card img{width:100%;height:198px;object-fit:contain;object-position:center center;display:block}
.analysis-image-caption{height:40px;background:#2a2b28;color:#b9bab4;border-top:1px solid #3c3d3a;display:flex;align-items:center;padding:0 10px;font-size:13px;font-weight:800}
.image-carousel-nav{position:absolute;right:9px;bottom:9px;z-index:2;width:34px;height:34px;border:1px solid rgba(103,212,232,.42);border-radius:999px;background:rgba(15,17,21,.82);color:#f2f1ea;font-size:20px;font-weight:950;display:grid;place-items:center;box-shadow:0 8px 18px rgba(0,0,0,.34)}
.image-carousel-nav.prev{right:50px}
.image-carousel-nav:hover{border-color:var(--cyan);color:var(--cyan)}
.image-carousel-count{position:absolute;right:93px;bottom:14px;z-index:2;color:#b9bab4;background:rgba(15,17,21,.72);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px 8px;font-size:10px;font-weight:850}
.analysis-overview-grid{display:grid;grid-template-columns:minmax(310px,420px) minmax(0,1fr);gap:12px;align-items:start;margin-bottom:16px}
.analysis-left-stack{display:grid;gap:10px;min-width:0}
.analysis-left-stack .analysis-image-carousel{margin-bottom:0}
.analysis-left-stack .analysis-image-card{min-height:158px}
.analysis-left-stack .analysis-image-card img{height:144px}
.analysis-left-stack .analysis-image-caption{height:34px;font-size:12px}
.analysis-left-stack .analysis-ai-strip{margin-bottom:0}
.visual-summary-panel{border:1px solid #3a3a3a;background:#1c1d1b;border-radius:8px;padding:12px;min-width:0;overflow:hidden}
.visual-summary-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.visual-summary-head h3{margin:0;font-size:14px;font-weight:950}
.visual-summary-head span{color:#aaa89c;font-size:11px;font-weight:850}
.visual-summary-main{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:10px}
.visual-card{border:1px solid rgba(103,212,232,.22);background:rgba(103,212,232,.045);border-radius:8px;padding:10px;min-width:0;overflow:hidden}
.visual-card-title{font-size:12px;font-weight:950;color:#f2f1ea;margin-bottom:8px}
.visual-side-stage{position:relative;border-radius:7px;overflow:hidden;background:#f4f4f2;aspect-ratio:16/9;min-height:0;display:flex;align-items:center;justify-content:center}
.visual-side-stage img{width:100%;height:100%;min-height:0;object-fit:contain;display:block}
.visual-callout{position:absolute;transform:translate(-50%,-50%);background:#0f2638;border:1px solid rgba(103,212,232,.65);box-shadow:0 6px 14px rgba(0,0,0,.32);border-radius:6px;padding:5px 7px;min-width:74px;color:#f2f1ea;font-size:11px;font-weight:850;line-height:1.25;text-align:left}
.visual-callout b{display:block;color:#9fe8f1;font-size:10px;font-weight:950;margin-bottom:1px}
.visual-footnote{color:#aaa89c;font-size:10.5px;line-height:1.45;margin-top:7px}
.sole-profile-svg{width:100%;height:auto;display:block;min-height:0;max-height:230px}
.sole-profile-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.sole-chip{border:1px solid rgba(103,212,232,.24);background:rgba(0,0,0,.16);border-radius:999px;color:#e9edf2;font-size:11px;font-weight:820;padding:4px 8px;line-height:1.2}
.part-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.part-summary-card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.032);border-radius:8px;padding:9px;min-width:0}
.part-summary-card strong{display:block;color:#f2f1ea;font-size:12px;font-weight:950;margin-bottom:6px}
.part-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;color:#b9bab4;font-size:11.5px;line-height:1.35}
.part-row span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.part-row span:last-child{color:#f2f1ea;font-weight:900;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.part-note{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08);color:#b9bab4;font-size:10.8px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.image-lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(5,7,10,.86);padding:28px}
.image-lightbox.open{display:flex}
.image-lightbox-panel{position:relative;display:grid;gap:10px;max-width:min(1180px,94vw);max-height:92vh}
.image-lightbox-panel img{max-width:100%;max-height:82vh;object-fit:contain;display:block;background:#f4f4f2;border:1px solid rgba(255,255,255,.18);border-radius:8px}
.image-lightbox-caption{color:#edf1f7;font-size:13px;font-weight:850;text-align:center}
.image-lightbox-close{position:absolute;right:-12px;top:-12px;width:34px;height:34px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:#171b22;color:#edf1f7;font-size:22px;line-height:1;display:grid;place-items:center}
.image-lightbox-close:hover{border-color:#5aa7ff;color:#5aa7ff}
.mini-overview-panel{position:fixed;z-index:90;left:380px;right:0;top:0;bottom:0;display:none;grid-template-rows:auto minmax(0,1fr);border-left:1px solid rgba(103,212,232,.34);background:rgba(17,21,27,.98);box-shadow:-18px 0 40px rgba(0,0,0,.36);overflow:hidden}
.mini-overview-panel.open{display:grid}
.mini-overview-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(90deg,rgba(103,212,232,.09),rgba(255,255,255,.02))}
.mini-overview-title{display:grid;gap:2px;min-width:0}
.mini-overview-title strong{font-size:20px;font-weight:950;color:#f2f1ea}
.mini-overview-title span{font-size:12px;font-weight:760;color:#9aa6b5}
.mini-overview-close{width:34px;height:34px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:#151a21;color:#edf1f7;font-size:22px;line-height:1;display:grid;place-items:center}
.mini-overview-close:hover{border-color:var(--cyan);color:var(--cyan)}
.mini-overview-list{min-height:0;overflow:auto;padding:18px 22px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start}
.mini-overview-card{width:100%;border:1px solid rgba(255,255,255,.12);background:#171b22;border-radius:8px;padding:10px;display:grid;grid-template-columns:72px minmax(0,1fr);gap:11px;text-align:left;color:inherit;transition:.12s}
.mini-overview-card:hover,.mini-overview-card.active{border-color:rgba(103,212,232,.62);background:#1b222d}
.mini-overview-thumb{width:72px;height:58px;border-radius:6px;background:#f7f8fb;overflow:hidden;display:grid;place-items:center;color:#8792a2;font-size:10px}
.mini-overview-thumb img{width:100%;height:100%;object-fit:contain;display:block}
.mini-overview-info{min-width:0;display:grid;gap:3px;align-content:center}
.mini-overview-name{font-size:13px;font-weight:900;color:#f2f1ea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-overview-meta{font-size:11px;font-weight:700;color:#9aa6b5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-overview-pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.mini-overview-empty{min-height:120px;display:grid;place-items:center;text-align:center;color:#9aa6b5;font-size:12px;line-height:1.6}
.analysis-ai-strip{border:1px solid #3a3a3a;background:#1c1d1b;border-radius:8px;padding:10px 14px;margin-bottom:10px}
.analysis-brief-full{border:1px solid #3a3a3a;background:#1c1d1b;border-radius:8px;padding:16px;margin-bottom:16px}
.analysis-panel{border:1px solid #3a3a3a;background:#1c1d1b;border-radius:8px;padding:16px}
.analysis-panel-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:950;margin-bottom:10px}
.analysis-panel-title.compact{font-size:13px;margin-bottom:8px}
.analysis-icon{width:26px;height:26px;border:3px solid #f1f1ec;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#f1f1ec;font-size:15px;font-weight:950}
.analysis-icon.sm{width:20px;height:20px;font-size:12px;border-width:2px;border-radius:6px}
.label-bars{display:flex;flex-direction:row;gap:0;align-items:stretch}
.label-row{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;padding:4px 10px;border-right:1px solid #2d2e2b;min-width:0}
.label-row:last-child{border-right:none}
.label-code{font-size:12px;font-weight:950;color:#b9bab4;letter-spacing:.5px}
.label-track{height:5px;background:#2d2e2b;border-radius:99px;overflow:hidden;width:100%;max-width:80px}
.label-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#79dc9b 0%,#69d6d5 52%,#f0c257 100%)}
.label-score{font-size:15px;font-weight:900;color:#f2f1ea}
.brief-stack{display:grid;grid-template-columns:minmax(280px,1fr) minmax(280px,1fr);gap:10px;max-height:none}
.brief-stack>.brief-card.primary{grid-column:1/-1}
.brief-card{border:1px solid #3a3a3a;background:#242522;border-radius:8px;padding:14px}
.brief-card.primary{border-color:rgba(95,218,230,.5);background:linear-gradient(120deg,rgba(80,218,230,.13),rgba(229,184,77,.05))}
.brief-card strong{display:block;color:#5fdbe8;font-size:12px;font-weight:950;margin-bottom:8px}
.brief-card h3{font-size:20px;margin:0 0 8px;font-weight:950;line-height:1.25}
.brief-card p{margin:0;color:#ddded8;line-height:1.6;font-size:14px}
.brief-card ul{margin:0;padding-left:18px;color:#ddded8;line-height:1.9;font-size:14px}
.brief-card li{margin:0}
.agent-opinion-panel{display:grid;gap:12px}
.agent-tabs{display:flex;flex-wrap:wrap;gap:8px;background:#161a20;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px}
.agent-tab{height:31px;border:1px solid var(--line);background:#151a21;color:#cdd6e0;border-radius:8px;padding:0 10px;display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:900;white-space:nowrap}
.agent-tab:hover,.agent-tab.active{border-color:rgba(103,212,232,.62);background:rgba(103,212,232,.12);color:#f2f1ea}
.agent-avatar{width:22px;height:22px;border-radius:6px;object-fit:cover;display:block;background:linear-gradient(135deg,rgba(103,212,232,.22),rgba(232,186,98,.16));border:1px solid rgba(255,255,255,.12);flex:0 0 auto}
.agent-avatar.fallback{display:grid;place-items:center;font-size:10px;font-weight:950;color:#f2f1ea}
.agent-opinion-view{display:none}
.agent-opinion-view.active{display:block}
.agent-main-card{border:1px solid #3a3a3a;background:linear-gradient(90deg,rgba(103,212,232,.09),rgba(255,255,255,.025) 42%,rgba(255,255,255,.02));border-radius:8px;padding:16px;margin-bottom:12px}
.agent-header{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.agent-face{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,rgba(103,212,232,.30),rgba(232,186,98,.16));border:1px solid rgba(255,255,255,.13);object-fit:cover;display:block;flex:0 0 auto}
.agent-face.fallback{display:grid;place-items:center;color:#f2f1ea;font-size:18px;font-weight:950}
.agent-name{font-size:17px;font-weight:950;color:#f2f1ea;line-height:1.2}
.agent-role{color:#b9bab4;font-size:12px;font-weight:750;margin-top:4px}
.agent-summary-label{color:#5fdbe8;font-size:11px;font-weight:950;margin-bottom:7px}
.agent-summary{font-size:17px;line-height:1.55;font-weight:850;color:#f2f1ea;word-break:keep-all;overflow-wrap:anywhere}
.agent-note{margin-top:12px;border:1px solid rgba(103,212,232,.28);background:rgba(103,212,232,.07);border-radius:8px;padding:10px 12px;color:#dce3e8;font-size:13px;font-weight:750;line-height:1.5}
.agent-graph{border:1px solid rgba(103,212,232,.24);background:rgba(103,212,232,.045);border-radius:8px;padding:12px;margin:10px 0 14px;overflow:hidden}
.agent-graph-title{display:flex;align-items:center;justify-content:space-between;gap:10px;color:#5fdbe8;font-size:13px;font-weight:950;margin-bottom:10px}
.agent-graph-title span{color:#aaa89c;font-size:10.5px;font-weight:850}
.last-agent-graph-frame{position:relative;height:clamp(180px,17vw,245px);max-width:1180px;margin:0 auto;border-radius:7px;background:linear-gradient(180deg,rgba(5,12,24,.92),rgba(13,28,39,.78));overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.last-agent-svg{width:100%;height:100%;display:block}
.last-agent-callout{position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);background:#0f2638;border:1px solid rgba(103,212,232,.64);border-radius:6px;padding:4px 6px;box-shadow:0 6px 14px rgba(0,0,0,.32);min-width:72px;max-width:128px;color:#f2f1ea;font-size:10.5px;font-weight:850;line-height:1.22}
.last-agent-callout b{display:block;color:#9fe8f1;font-size:9px;font-weight:950;margin-bottom:1px;white-space:nowrap}
.last-agent-callout span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.visual-chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.visual-chip-row span{border:1px solid rgba(103,212,232,.24);background:rgba(0,0,0,.16);border-radius:999px;color:#dbeafe;font-size:10.5px;font-weight:820;padding:3px 7px;line-height:1.25}
.mold-agent-bars{display:grid;gap:8px}
.mold-agent-bar{display:grid;grid-template-columns:104px minmax(0,1fr) 88px;gap:8px;align-items:center;color:#ddded8;font-size:12px;font-weight:800}
.mold-agent-track{height:9px;border-radius:999px;background:rgba(255,255,255,.11);overflow:hidden}
.mold-agent-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#5aa7ff,#67d4e8)}
.mold-agent-value{color:#f2f1ea;text-align:right;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biomech-flow{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-bottom:10px}
.biomech-flow span{border:1px solid rgba(103,212,232,.25);background:rgba(255,255,255,.035);border-radius:8px;padding:7px 4px;text-align:center;color:#f2f1ea;font-size:11px;font-weight:950}
.biomech-stage-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.biomech-stage-card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:8px;padding:9px;min-width:0}
.biomech-stage-head{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.biomech-stage-head i{width:24px;height:24px;border-radius:999px;background:rgba(90,167,255,.18);display:grid;place-items:center;color:#b8d8ff;font-style:normal;font-size:11px;font-weight:950}
.biomech-stage-head strong{color:#f2f1ea;font-size:12px;font-weight:950}
.biomech-stage-head span{margin-left:auto;color:#67d4e8;font-size:11px;font-weight:950}
.biomech-stage-track{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:7px}
.biomech-stage-track span{height:8px;border-radius:999px;background:rgba(255,255,255,.12)}
.biomech-stage-track span.active{background:linear-gradient(90deg,#5aa7ff,#67d4e8)}
.biomech-stage-note{color:#ddded8;font-size:11px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.generic-agent-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.generic-agent-chip{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:8px;padding:8px;min-width:0}
.generic-agent-chip b{display:block;color:#b9bab4;font-size:10.5px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.generic-agent-chip span{display:block;color:#f2f1ea;font-size:12px;font-weight:950;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.agent-detail-card{border:1px solid #3a3a3a;background:#242522;border-radius:8px;padding:13px;min-height:118px}
.agent-detail-card strong{display:block;color:#5fdbe8;font-size:12px;font-weight:950;margin-bottom:8px}
.agent-detail-card p{margin:0;color:#ddded8;font-size:13px;line-height:1.65}
.agent-detail-card ul{margin:0;padding-left:18px;color:#ddded8;font-size:13px;line-height:1.75}
.agent-detail-card li{margin:0 0 2px}
.analysis-metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(142px,1fr));gap:7px;margin-bottom:2px}
.analysis-metric-card{border:1px solid rgba(103,212,232,.22);background:linear-gradient(180deg,rgba(103,212,232,.08),rgba(255,255,255,.035));border-radius:8px;padding:8px;min-width:0;min-height:0;display:grid;gap:5px;align-content:start}
.analysis-metric-card.compact .analysis-metric-value{font-size:14px;line-height:1.22;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.analysis-metric-card.has-zone-details{grid-column:1/-1}
.analysis-metric-card.compact.has-zone-details .analysis-metric-value{display:block;-webkit-line-clamp:unset;overflow:visible}
.analysis-metric-card.status-estimated_from_visual,.analysis-metric-card.status-inferred_from_guideline{border-color:rgba(232,186,98,.38);background:linear-gradient(180deg,rgba(232,186,98,.10),rgba(255,255,255,.03))}
.analysis-metric-card.status-detected,.analysis-metric-card.status-visual_observation,.analysis-metric-card.status-derived_from_real_last_spec{border-color:rgba(120,216,155,.34);background:linear-gradient(180deg,rgba(120,216,155,.08),rgba(255,255,255,.03))}
.analysis-metric-card.status-external_research{border-color:rgba(103,212,232,.34);background:linear-gradient(180deg,rgba(103,212,232,.09),rgba(255,255,255,.03))}
.analysis-metric-card.status-needs_sample_measurement,.analysis-metric-card.status-recheck,.analysis-metric-card.status-not_found{border-color:rgba(229,111,106,.38);background:linear-gradient(180deg,rgba(229,111,106,.09),rgba(255,255,255,.03))}
.analysis-metric-label{font-size:10.5px;color:#aaa89c;font-weight:760;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.analysis-metric-value{font-size:18px;font-weight:820;color:#f2f1ea;line-height:1.14;overflow-wrap:anywhere;word-break:keep-all}
.analysis-metric-value.needs{color:var(--red);font-size:14px;line-height:1.25}
.value-number{color:var(--cyan);font-weight:920}
.status-estimated_from_visual .value-number,.status-inferred_from_guideline .value-number{color:var(--amber)}
.status-detected .value-number,.status-visual_observation .value-number,.status-derived_from_real_last_spec .value-number{color:var(--green)}
.value-unit{color:#d7d4c8;font-size:.84em;font-weight:760}
.analysis-metric-meta{display:flex;gap:5px;flex-wrap:wrap}
.analysis-source{font-size:10px;color:#aaa89c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero{display:grid;grid-template-columns:minmax(260px,.72fr) minmax(0,1.28fr);gap:16px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}
.hero-media{background:var(--white);border-radius:8px;min-height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-media img{width:100%;height:100%;max-height:420px;object-fit:contain;object-position:center center}
.hero-info{min-width:0}
.breadcrumb{font-size:11px;color:var(--muted);margin-bottom:8px}
.hero h2{font-size:25px;line-height:1.16;margin:0 0 8px;font-weight:900}
.hero p{margin:0;color:var(--muted);line-height:1.65}
.brief-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-top:14px}
.brief{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:13px}
.brief strong{display:block;color:var(--amber);font-size:11px;margin-bottom:7px}
.brief h3{font-size:15px;line-height:1.35;margin:0 0 6px}
.brief ul{margin:0;padding-left:17px;color:var(--muted);line-height:1.55}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 12px}
.toolbar h3{font-size:15px;margin:0;font-weight:850}
.tabs{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.tabs button{height:32px;border:0;border-right:1px solid var(--line);background:var(--panel);color:var(--muted);padding:0 13px;font-size:12px;font-weight:800}
.tabs button:last-child{border-right:0}
.tabs button.active{background:var(--blue);color:#06111f}
.section{display:none}
.section.active{display:block}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.image-card{border:1px solid var(--line);background:#fff;border-radius:8px;overflow:hidden;min-height:132px;position:relative}
.image-card img{width:100%;height:132px;object-fit:contain;object-position:center center;display:block}
.image-card span{position:absolute;left:7px;bottom:7px;background:rgba(15,17,21,.82);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:2px 7px;font-size:10px;font-weight:850;color:var(--text)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:16px}
.metric-card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:11px;min-width:0}
.metric-label{font-size:11px;color:var(--muted);font-weight:850;margin-bottom:7px}
.metric-value{font-size:18px;font-weight:900;line-height:1.25;overflow-wrap:anywhere}
.metric-value.needs{color:var(--amber);font-size:14px}
.spec-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.dashboard-field-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.spec-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035);border-radius:8px;min-width:0;padding:10px;position:relative;overflow:hidden}
.spec-card.section-accessory_spec,.spec-card.section-pattern_analysis{grid-column:1/-1}
.spec-card::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(220px circle at var(--mx,-260px) var(--my,-260px),rgba(103,212,232,.14),rgba(232,186,98,.08),transparent 72%);transition:opacity .22s ease}
.spec-card:hover::before{opacity:1}
.spec-card>summary,.spec-card>.spec-body{position:relative;z-index:1}
.spec-card summary{list-style:none;display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;cursor:pointer;color:#f2f1ea;font-weight:760;font-size:13px}
.spec-card summary::-webkit-details-marker{display:none}
.spec-card summary::after{content:"+";color:var(--cyan);border:1px solid rgba(103,212,232,.26);border-radius:999px;width:20px;height:20px;display:inline-grid;place-items:center;font-size:13px;line-height:1}
.spec-card[open]>summary::after{content:"-"}
.spec-body{display:grid;gap:8px;margin-top:10px}
.spec-row{display:grid;gap:5px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.14);border-radius:8px;padding:8px;font-size:12px;line-height:1.45;color:#dfddd3}
.spec-head{display:flex;flex-wrap:wrap;align-items:center;gap:6px;color:#f2f1ea;font-weight:720}
.spec-key{font-size:12px;color:#f2f1ea;font-weight:720}
.spec-value{color:#f3f1e8;font-size:15px;font-weight:740;line-height:1.35;overflow-wrap:anywhere;word-break:keep-all}
.zone-table{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:8px}
.zone-item{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:7px;padding:8px}
.zone-title{display:grid;grid-template-columns:1fr;gap:4px;margin-bottom:5px;color:#f3f1e8;font-size:12px;font-weight:780}
.zone-title .spec-pill{width:max-content}
.zone-detail{display:grid;grid-template-columns:1fr;gap:2px;color:#aaa89c;font-size:10.5px;line-height:1.32}
.zone-detail strong{color:#dfddd3;font-weight:760;margin-top:4px}
.zone-detail strong:first-child{margin-top:0}
.zone-detail span{word-break:keep-all;overflow-wrap:break-word}
.spec-meta{display:flex;flex-wrap:wrap;gap:5px}
.spec-pill{min-height:20px;display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:2px 7px;color:#aaa89c;background:rgba(255,255,255,.035);max-width:100%;font-size:11px;line-height:1.25}
.spec-pill.detected,.spec-pill.visual_observation,.spec-pill.derived_from_real_last_spec{color:var(--green);border-color:rgba(120,216,155,.3)}
.spec-pill.estimated_from_visual,.spec-pill.inferred_from_guideline{color:var(--amber);border-color:rgba(232,186,98,.34)}
.spec-pill.external_research{color:var(--cyan);border-color:rgba(103,212,232,.34)}
.spec-pill.conf-high{color:var(--green);border-color:rgba(120,216,155,.32)}
.spec-pill.conf-mid{color:var(--amber);border-color:rgba(232,186,98,.34)}
.spec-pill.conf-low{color:var(--red);border-color:rgba(229,111,106,.36)}
.spec-pill.needs_sample_measurement,.spec-pill.recheck,.spec-pill.not_found{color:var(--red);border-color:rgba(229,111,106,.36)}
.spec-evidence{color:#aaa89c;font-size:11px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere}
.spec-detail{border-top:1px solid rgba(255,255,255,.08);padding-top:6px;color:#aaa89c;font-size:11px}
.spec-detail summary{list-style:none;cursor:pointer;color:var(--cyan);font-size:11px;font-weight:700;border:0;background:transparent;padding:0;margin-bottom:4px}
.spec-detail summary::-webkit-details-marker{display:none}
pre{margin:0;border:1px solid var(--line);background:#090b0f;border-radius:8px;padding:14px;overflow:auto;color:#dce5f5;font-size:11px;line-height:1.6}
@media (max-width:960px){
  html,body{overflow:hidden}
  .app{grid-template-columns:1fr;grid-template-rows:46vh minmax(0,1fr);height:100vh}
  .sidebar{height:auto;border-right:0;border-bottom:1px solid var(--line)}
  .content{height:auto;min-height:0}
  .filters{grid-template-columns:1fr 1fr 1fr}
  .filters input{grid-column:1/-1}
  .hero,.brief-grid{grid-template-columns:1fr}
  .brief-stack{grid-template-columns:1fr}
  .agent-detail-grid{grid-template-columns:1fr}
  .biomech-stage-grid,.generic-agent-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .analysis-overview-grid{grid-template-columns:1fr}
  .visual-summary-main{grid-template-columns:1fr}
  .part-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .analysis-image-row{grid-template-columns:repeat(5,220px)}
  .spec-grid{grid-template-columns:1fr}
  .dashboard-field-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .mini-overview-panel{left:0;right:0;top:0;bottom:0;width:auto;max-height:none}
}
@media (max-width:640px){
  .filters{grid-template-columns:1fr 1fr}
  .filters input{grid-column:1/-1}
  .analysis-image-page{grid-template-columns:1fr}
  .part-summary-grid{grid-template-columns:1fr}
  .dashboard-field-grid{grid-template-columns:1fr}
  .analysis-metric-card.has-zone-details{grid-column:1/-1}
  .zone-table{grid-template-columns:repeat(2,minmax(0,1fr))}
}
.ownership-toggle{display:flex;gap:5px;margin-bottom:10px;align-items:center}
.own-btn{height:28px;padding:0 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:11px;font-weight:850;cursor:pointer;transition:.12s;letter-spacing:.3px;white-space:nowrap}
.own-btn:hover{border-color:var(--blue);color:var(--text)}
.own-btn.active[data-val=""]{border-color:rgba(103,212,232,.55);color:var(--cyan);background:rgba(103,212,232,.1)}
.own-btn.active[data-val="internal"]{border-color:rgba(103,212,232,.55);color:var(--cyan);background:rgba(103,212,232,.1)}
.own-btn.active[data-val="competitor"]{border-color:rgba(232,186,98,.55);color:var(--amber);background:rgba(232,186,98,.1)}
.own-btn.recent-btn.active{border-color:rgba(121,224,171,.65);color:var(--green);background:rgba(121,224,171,.1)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="topbar">
      <div class="title">
        <h1>Products R&D Viewer</h1>
        <span class="mode" id="mode">LOCAL</span>
      </div>
      <div class="ownership-toggle">
        <button class="own-btn active" data-val="" type="button" onclick="setOwnership(this)">전체보기</button>
        <button class="own-btn" data-val="internal" type="button" onclick="setOwnership(this)">자사</button>
        <button class="own-btn" data-val="competitor" type="button" onclick="setOwnership(this)">타사</button>
        <button class="own-btn recent-btn" id="recentToggle" type="button" onclick="toggleRecent()">최근등록</button>
        <button id="miniOverviewToggle" class="own-btn overview-toggle" type="button" title="전체맵" aria-label="전체맵" aria-expanded="false" onclick="toggleMiniOverview()">전체맵</button>
      </div>
      <div class="filters">
        <input id="search" type="search" placeholder="브랜드, 제품명, SKU, 컬러 검색">
        <select id="brand">
          <option value="">전체 브랜드</option>
        </select>
        <select id="status">
          <option value="">전체 상태</option>
          <option value="complete">분석 완료</option>
          <option value="not_analyzed">미분석</option>
          <option value="error">오류</option>
        </select>
        <button id="refresh" type="button">새로고침</button>
      </div>
      <div class="meta-row"><span id="count">0 styles</span><span id="updated">-</span></div>
    </div>
    <div class="list" id="productList"></div>
  </aside>
  <main class="content" id="content">
    <div class="empty">제품 카드를 선택하면<br>R&D 상세 분석 결과가 표시됩니다.</div>
  </main>
</div>
<aside class="mini-overview-panel" id="miniOverviewPanel" aria-hidden="true">
  <div class="mini-overview-head">
    <div class="mini-overview-title">
      <strong>전체맵</strong>
      <span id="miniOverviewMeta">0 styles</span>
    </div>
    <button class="mini-overview-close" type="button" aria-label="전체 미니보기 닫기" onclick="toggleMiniOverview(false)">×</button>
  </div>
  <div class="mini-overview-list" id="miniOverviewList"></div>
</aside>
<div class="image-lightbox" id="imageLightbox" aria-hidden="true" onclick="closeImageLightbox()">
  <div class="image-lightbox-panel" onclick="event.stopPropagation()">
    <button class="image-lightbox-close" type="button" aria-label="이미지 닫기" onclick="closeImageLightbox()">×</button>
    <img id="imageLightboxImg" src="" alt="">
    <div class="image-lightbox-caption" id="imageLightboxCaption"></div>
  </div>
</div>

<script>
const state={allProducts:[],products:[],selected:null,run:null,mode:"local",canDelete:true,refreshTimer:null,productsSignature:"",brandSignature:"",miniOverviewOpen:false,recentOnly:false};
const $=id=>document.getElementById(id);
const esc=value=>String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
const text=value=>Array.isArray(value)?value.map(text).join(" / "):(value&&typeof value==="object"?JSON.stringify(value):String(value??""));
const sectionAliases={pattern_spec:"pattern_analysis",biomechanics_spec:"biomechanics_analysis",design_spec:"design_review"};
const currentSectionFields={
  last_spec:new Set(["toe_shape","toe_spring_mm","heel_spring_mm","toe_box_height_mm","width_grade","forefoot_contact_width_mm","heel_contact_width_mm","last_type","instep_profile","focus","instep_girth","ball_girth","last_pitch"]),
  arch_waist_spec:new Set(["arch_midsole_thickness","waist_width_ratio","midfoot_stiffness","torsion_stiffness","torsion_risk"]),
  mold_spec:new Set(["heel_midsole_height_mm","forefoot_midsole_height_mm","drop_mm","outsole_toe_lift_mm","midsole_hardness_shore_c","outsole_rubber_coverage","lug_height_mm","lug_pattern","mold_adjustment_type","heel_outer_projection","heel_cup_height_mm","target_weight_240mm"]),
  outsole_spec:new Set(["outsole_thickness","contact_ratio","outsole_color","outsole_structure","ground_contact_ratio"]),
  material_spec:new Set(["mesh_type","synthetic_type","nosew_film_present","lining_visible","material_durability_risk","material_count","main_upper_material_candidates","synthetic_thickness","mesh_weight","mesh_zone","rib_type","rib_zone","tongue_foam","collar_padding","lining_foam","lining_foam_thickness"]),
  pattern_analysis:new Set(["construction_method","vamp_line","heel_tab_style","collar_shape","alignment_risk","minimum_curve_radius","overlap_width_if_nosew","logo_width","logo_method","logo_position","toe_cap_style","heel_structure","collar_structure","vamp_method","quarter_method","tongue_deco_method","tongue_foam_method","pattern_alignment_risk"]),
  accessory_spec:new Set(["lace_type","insole_material","insole_thickness","heel_tab_material","heel_tab_width","woven_width","label_size","heel_counter","padding_foam_type"]),
  biomechanics_analysis:new Set(["ground_contact_stability","flex_point_estimate","toe_off_behavior","torsional_stability","cushioning_response","motion_risk","waist_contact_width_ratio","flex_point"]),
  color_spec:new Set(["dominant_color_group","accent_colors","material_color_match_risk","color_deviation_risk","stain_or_migration_risk","color_main","color_accent","color_sole","color_lace","color_scheme","color_quality_risk"]),
  design_review:new Set(["silhouette","market_position","trend_direction","similar_product_reference","target_consumer","planning_position","design_strengths","design_style","raw_category"])
};
const hiddenSectionNames=new Set(["quality_checklist","internal_real_data","midsole_material_spec"]);
const removedSpecFields=new Set(["tooling_risk","mold_shrinkage","shrinkage_control","wet_slip_risk","rubber_gravity","rubber_density","midfoot_rubber","forefoot_rubber","heel_rubber","toe_tip_rubber","drain_depth","lace_color","lace_width","lace_length","insole_type","insole_fabric","heel_tab_color","midsole_material_candidates","midsole_material_priority","midsole_density_target","midsole_rank","midsole_material_reason","design_risks","logo_position_tolerance","overlay_zones","logo_height","pattern_line_type","brand_mood","analysis_note","recommendations","midsole_material_spec","midsole_gravity","rebound","compression_set","yellowing_risk","hydrolysis_risk","reinforcement_zones","outsole_hardness","mold_type","heel_bulge"]);

init();

async function init(){
  $("search").addEventListener("input", debounce(loadProducts,180));
  $("brand").addEventListener("change", applyProductFilters);
  $("status").addEventListener("change", loadProducts);
  $("refresh").addEventListener("click", ()=>loadProducts({force:true}));
  $("productList").addEventListener("click",event=>{
    const thumb=event.target.closest(".thumb[data-lightbox-url]");
    if(!thumb) return;
    event.preventDefault();
    event.stopPropagation();
    openImageLightbox(thumb.dataset.lightboxUrl,thumb.dataset.lightboxCaption);
  });
  $("productList").addEventListener("keydown",event=>{
    if(event.key!=="Enter"&&event.key!==" ") return;
    const thumb=event.target.closest(".thumb[data-lightbox-url]");
    if(!thumb) return;
    event.preventDefault();
    event.stopPropagation();
    openImageLightbox(thumb.dataset.lightboxUrl,thumb.dataset.lightboxCaption);
  });
  $("content").addEventListener("click",event=>{
    const card=event.target.closest(".analysis-image-card");
    if(card){
      openImageLightbox(card.dataset.lightboxUrl,card.dataset.lightboxCaption);
      return;
    }
  });
  $("content").addEventListener("keydown",event=>{
    if(event.key!=="Enter"&&event.key!==" ") return;
    const card=event.target.closest(".analysis-image-card");
    if(!card) return;
    event.preventDefault();
    openImageLightbox(card.dataset.lightboxUrl,card.dataset.lightboxCaption);
  });
  document.addEventListener("keydown",event=>{
    if(event.key==="Escape"){
      closeImageLightbox();
      toggleMiniOverview(false);
    }
  });
  await loadStatus();
  await loadProducts();
  if(state.mode!=="postgres"){
    state.refreshTimer=setInterval(()=>loadProducts({silent:true}),10000);
  }
}

async function loadStatus(){

async function loadProducts(options={}){
  const params=new URLSearchParams();
  if($("search").value.trim()) params.set("q",$("search").value.trim());
  const ownership=getOwnership();
  if(ownership) params.set("ownership",ownership);
  if($("status").value) params.set("status",$("status").value);
  if(state.recentOnly) params.set("recent","1");
  let data;
  try{
    data=await api(`/api/products?${params.toString()}`);
  }catch(err){
    if(options.silent) return;
    $("productList").innerHTML=`<div class="empty" style="min-height:180px">제품 목록을 불러오지 못했습니다.<br>${esc(err.message||err)}</div>`;
    return;
  }
  const normalizedProducts=filterDisplayableProducts(normalizeProducts(data.products||[]));
  const nextSignature=productsSignature(normalizedProducts,data.mode,state.canDelete);
  if(options.silent&&nextSignature===state.productsSignature) return;
  state.allProducts=normalizedProducts;
  state.productsSignature=nextSignature;
  state.mode=data.mode||state.mode;
  $("mode").textContent=state.mode.toUpperCase();
  renderBrandFilter();
  applyProductFilters({preserveSelection:true,preserveTime:options.silent});
  if(options.force) $("updated").textContent=`수동 갱신 ${new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`;
}

function applyProductFilters(options={}){
  const brand=$("brand").value;
  state.products=brand?state.allProducts.filter(product=>(product.brand||"")===brand):state.allProducts.slice();
  $("count").textContent=`${state.recentOnly?"최근등록 ":""}${state.products.length} styles`;
  if(!options.preserveTime) $("updated").textContent=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
  renderList();
  renderMiniOverview();
  if(!state.products.some(product=>product.product_id===state.selected)){
    state.selected=null;
    state.run=null;
  }
  if(!state.selected&&state.products[0]) selectProduct(state.products[0].product_id);
  if(!state.products.length){
    $("content").innerHTML='<div class="empty">조건에 맞는 제품이 없습니다.<br>필터를 조정하거나 product 폴더를 확인하세요.</div>';
  }
}

function normalizeProducts(products){
  return products.map(product=>{
    const metadata=product.metadata&&typeof product.metadata==="object"?product.metadata:{};
    const ownership=normalizeOwnership(product.ownership||metadata.ownership||metadata.owner_type||metadata.source_scope||metadata.product_scope||metadata.company_scope);
    const normalized=ownership||"competitor";
    return {
      ...product,
      ownership:normalized,
      ownership_label:product.ownership_label||ownershipLabel(normalized),
      category:product.category||metadata.category||metadata.product_type||"",
      season:product.season||metadata.season||"",
      project_code:product.project_code||metadata.project_code||metadata.style_number||"",
      image_urls:product.image_urls||metadata.image_urls||metadata.images||[],
      registered_at:product.registered_at||metadata.registered_at||product.created_at||product.latest_run_updated_at||""
    };
  });
}

function filterDisplayableProducts(products){
  return products.filter(product=>hasDisplayImage(product));
}

function hasDisplayImage(product){
  return Boolean(firstDisplayImageUrl(product.representative_image_url,product.image_urls));
}

function firstDisplayImageUrl(...values){
  const urls=displayImageUrls(...values);
  return urls[0]||"";
}

function displayImageUrls(...values){
  const urls=[];
  const seen=new Set();
  values.forEach(value=>{
    iterImageUrls(value).forEach(url=>{
      if(seen.has(url)) return;
      seen.add(url);
      urls.push(url);
    });
  });
  return urls;
}

function iterImageUrls(value){
  if(value==null||value==="") return [];
  if(typeof value==="string"){
    const raw=value.trim();
    if(!raw) return [];
    if(raw[0]==="["||raw[0]==="{"){
      try{return iterImageUrls(JSON.parse(raw))}catch(err){}
    }
    if(raw.includes(",")&&!raw.startsWith("http://")&&!raw.startsWith("https://")&&!raw.startsWith("/")){
      return raw.split(",").flatMap(part=>iterImageUrls(part));
    }
    return isDisplayImageUrl(raw)?[raw]:[];
  }
  if(Array.isArray(value)) return value.flatMap(item=>iterImageUrls(item));
  if(typeof value==="object"){
    const keys=["representative_image_url","image_url","public_url","url","src","source_url","thumbnail_url","image_urls","images","assets"];
    const urls=keys.flatMap(key=>key in value?iterImageUrls(value[key]):[]);
    if(urls.length) return urls;
    return Object.values(value).flatMap(item=>iterImageUrls(item));
  }
  return [];
}

function isDisplayImageUrl(value){
  const lower=String(value||"").trim().toLowerCase();
  if(!lower||["null","none","undefined","no image","n/a","na","-"].includes(lower)) return false;
  return lower.startsWith("http://")||lower.startsWith("https://")||lower.startsWith("/data/")||lower.startsWith("data:image/")||/\.(jpe?g|png|webp|gif|avif)(\?.*)?$/.test(lower);
}

function isTruthyParam(value){
  return ["1","true","yes","on","recent"].includes(String(value||"").trim().toLowerCase());
}

function recentProductRows(products,limit=20){
  return products.slice().sort((a,b)=>String(b.registered_at||b.latest_run_updated_at||b.updated_at||"").localeCompare(String(a.registered_at||a.latest_run_updated_at||a.updated_at||""))).slice(0,limit);
}

function groupProducts(products){
  const grouped=new Map();
  products.forEach(product=>{
    const ownership=normalizeOwnership(product.ownership)||"competitor";
    const brand=product.brand||"브랜드 미상";
    const key=`${ownership}__${brand}`;
    if(!grouped.has(key)){
      grouped.set(key,{ownership,brand,title:`${ownershipLabel(ownership)} / ${brand}`,products:[]});
    }
    grouped.get(key).products.push(product);
  });
  return [...grouped.values()].sort((a,b)=>{
    const ownerOrder={internal:0,competitor:1};
    return (ownerOrder[a.ownership]??9)-(ownerOrder[b.ownership]??9)||a.brand.localeCompare(b.brand,"ko");
  });
}

async function hideProduct(event,productId){
  event.stopPropagation();
  const product=state.products.find(item=>item.product_id===productId);
  const name=product?.product_name||product?.display_name||productId;
  if(!confirm(`대시보드에서 이 스타일을 삭제할까요?\\n\\n${name}\\n\\n원본 폴더는 지우지 않고 목록에서 숨김 처리됩니다.`)) return;
  try{
    await api(`/api/products/${encodeURIComponent(productId)}`,{method:"DELETE"});
    if(state.selected===productId){
      state.selected=null;
      state.run=null;
      $("content").innerHTML='<div class="empty">삭제되었습니다.<br>다른 제품 카드를 선택하세요.</div>';
    }
    await loadProducts();
  }catch(err){
    alert(`삭제 실패: ${err.message||err}`);
  }
}

async function selectProduct(productId){
  const previousSelected=state.selected;
  state.selected=productId;
  updateProductSelectionStyles(previousSelected,productId);
  const product=state.products.find(item=>item.product_id===productId);
  $("content").innerHTML='<div class="empty">분석 결과를 불러오는 중입니다.</div>';
  try{
    const runs=await api(`/api/products/${encodeURIComponent(productId)}/runs`);
    const latest=(runs.runs||[])[0];
    if(!latest){
      renderProductShell(product,null);
      return;
    }
    const detail=await api(`/api/runs/${encodeURIComponent(latest.run_id)}`);
    state.run=detail.run;
    renderProductShell(product,detail.run);
  }catch(err){
    $("content").innerHTML=`<div class="empty">불러오기 실패<br>${esc(err.message||err)}</div>`;
  }
}

function updateProductSelectionStyles(previousId,nextId){
  if(previousId){
    document.querySelector(`[data-product-card="${cssEscape(previousId)}"]`)?.classList.remove("active");
    document.querySelector(`[data-mini-product-card="${cssEscape(previousId)}"]`)?.classList.remove("active");
  }
  const next=document.querySelector(`[data-product-card="${cssEscape(nextId)}"]`);
  const mini=document.querySelector(`[data-mini-product-card="${cssEscape(nextId)}"]`);
  if(next) next.classList.add("active");
  if(mini) mini.classList.add("active");
  if(!next) renderList();
  if(!mini) renderMiniOverview();
}

function parseSpecNumber(value){
  const nums=String(value||"").match(/\d+(?:\.\d+)?/g)?.map(Number).filter(Number.isFinite)||[];
  if(!nums.length) return null;
  return nums.slice(0,2).reduce((sum,num)=>sum+num,0)/Math.min(nums.length,2);
}

function moveAnalyzerImages(button,delta){
  const root=button.closest(".analysis-image-carousel");
  if(!root) return;
  const pages=root.querySelector(".analysis-image-pages");
  const count=root.querySelectorAll(".analysis-image-page").length;
  if(!pages||count<2) return;
  const current=Number(root.dataset.carouselPage||0);
  const next=(current+delta+count)%count;
  root.dataset.carouselPage=String(next);
  pages.style.transform=`translateX(${-next*100}%)`;
  const counter=root.querySelector(".image-carousel-count");
  if(counter) counter.textContent=`${next+1}/${count}`;
}

function pickAnalyzerImageAssets(assets){
  const priority=["side","top","outsole","rear","perspective"];
  const candidates=(assets||[])
    .filter(asset=>asset.public_url||asset.url)
    .map((asset,index)=>({...asset,_index:index,_view:normalizeImageView(asset)}));
  const picked=[];
  const usedUrls=new Set();
  priority.forEach(view=>{
    const match=candidates
      .filter(asset=>asset._view===view&&!usedUrls.has(asset.public_url||asset.url))
      .sort((a,b)=>imageAssetRank(a,view)-imageAssetRank(b,view))[0];
    if(match){
      picked.push(match);
      usedUrls.add(match.public_url||match.url);
    }
  });
  candidates
    .filter(asset=>!usedUrls.has(asset.public_url||asset.url))
    .sort((a,b)=>imageAssetRank(a,a._view)-imageAssetRank(b,b._view))
    .forEach(asset=>{
    if(picked.length<12){
        picked.push(asset);
        usedUrls.add(asset.public_url||asset.url);
      }
    });
  return picked.slice(0,12);
}

function normalizeImageView(asset){
  const raw=String(asset.view_name||asset.view||asset.file_name||asset.name||"").toLowerCase();
  if(raw.includes("side")) return "side";
  if(raw.includes("top")) return "top";
  if(raw.includes("outsole")||raw.includes("bottom")) return "outsole";
  if(raw.includes("rear")||raw.includes("back")) return "rear";
  if(raw.includes("perspective")||raw.includes("three_quarter")) return "perspective";
  return raw||"image";
}

function imageAssetRank(asset,view){
  const name=String(asset.file_name||asset.name||"").toLowerCase();
  const kind=String(asset.asset_kind||asset.kind||"").toLowerCase();
  const exact={
    side:["side"],
    top:["top"],
    outsole:["bottom","outsole"],
    rear:["back","rear"],
    perspective:["three_quarter","perspective"]
  }[view]||[];
  let score=asset._index||0;
  if(kind==="source") score-=40;
  if(kind==="run") score-=20;
  exact.forEach((stem,index)=>{
    if(name===`${stem}.png`||name===`${stem}.jpg`||name===`${stem}.jpeg`||name===`${stem}.webp`) score-=30-index;
  });
  return score;
}

function entryByKey(entries,key){
  return (entries||[]).find(item=>item.key===key)||null;

function metricPercent(entry){
  const value=Number(entry?.number);
  if(!Number.isFinite(value)) return 48;
  const key=entry.key||"";
  const max=key.includes("weight")?450:key.includes("drop")?16:key.includes("lug")?8:key.includes("lift")||key.includes("spring")?26:42;
  return Math.max(18,Math.min(100,(value/max)*100));
}

function biomechLevel(value,key=""){
  const raw=String(value||"").toLowerCase();
  if(/높|high|양호|good|stable|안정/.test(raw)&&!/낮|low|주의|risk|불안/.test(raw)) return 3;
  if(/낮|low|주의|risk|불안|재검|확인/.test(raw)) return key==="motion_risk"?1:2;
  if(/중간|보통|mid|moderate/.test(raw)) return 2;
  return 2;
}

function biomechLevelLabel(level){
  return level>=3?"양호":level<=1?"주의":"보통";
}

function orderedSectionEntries(sections){
  const priority=["last_spec","mold_spec","outsole_spec","material_spec","arch_waist_spec","midsole_material_spec","accessory_spec","pattern_analysis","biomechanics_analysis","color_spec","design_review"];
  const entries=Object.entries(visibleAnalysisSections(sections||{}));
  const order=new Map(priority.map((name,index)=>[name,index]));
  return entries.sort(([a],[b])=>(order.get(a)??999)-(order.get(b)??999)||sectionLabel(a).localeCompare(sectionLabel(b),"ko"));
}

function visibleAnalysisSections(sections){
  return Object.fromEntries(Object.entries(sections||{}).filter(([name])=>!hiddenSectionNames.has(canonicalSection(name))));
}

function displaySpecFields(fields,sectionName=""){
  const hiddenLastKeys=new Set([
    "matched_last_data_no",
    "real_last_toe_spring_mm",
    "real_last_instep_girth_mm",
    "real_last_ball_girth_mm",
    "visual_estimated_toe_spring_mm",
    "visual_estimated_instep_girth",
    "visual_estimated_ball_girth",
    "pattern_no",
    "mold_dim_drawing_last_no"
  ]);
  return fields.filter(field=>{
    const section=canonicalSection(sectionName||field.section||"");
    const key=String(field.key||"");
    if(!shouldDisplaySpecField(section,key)) return false;
    if(section==="last_spec"&&hiddenLastKeys.has(field.key)) return false;
    return true;
  });
}

function shouldDisplaySpecField(section,key){
  const canonical=canonicalSection(section);
  const field=String(key||"");
  if(hiddenSectionNames.has(canonical)) return false;
  if(removedSpecFields.has(field)) return false;
  const allowed=currentSectionFields[canonical];
  if(allowed&&!allowed.has(field)) return false;
  return true;
}

function canonicalSection(section){
  const raw=String(section||"");
  return sectionAliases[raw]||raw;
}

function displaySpecValue(data,key=""){
  const value=data?.value??data;
  if(value&&typeof value==="object"&&!Array.isArray(value)&&/ball_girth/i.test(key)){
    const parts=[
      ["C_60_ball","60%"],
      ["D_70_ball","70%"],
      ["E_80_ball","80%"]
    ].map(([source,label])=>value[source]?`${label} ${value[source]}`:"").filter(Boolean);
    if(parts.length) return parts.join(" / ");
  }
  return text(value);
}

function renderDashboardValueCard(field){
  const data=field.data||{};
  const status=fieldStatus(data);
  const rawValue=displaySpecValue(data,field.key);
  const detail=[data.evidence?`근거: ${text(data.evidence)}`:"",data.notes?`메모: ${text(data.notes)}`:""].filter(Boolean).join("\n\n");
  const zoneDetails=field.key==="reinforcement_zones"?renderZoneDetails(data):"";
  const hasZoneDetails=Boolean(zoneDetails);
  const zoneCount=Array.isArray(data.zone_details)?data.zone_details.length:0;
  const value=hasZoneDetails&&zoneCount?`${zoneCount}개 부위 보강 적용`:compactSpecValue(rawValue,field.key);

function collectSpecFields(data,section="",path=[]){
  if(isSpecField(data)) return [{section,key:path[path.length-1]||section,path:path.join("."),data}];
  if(Array.isArray(data)) return data.flatMap((item,index)=>collectSpecFields(item,section,[...path,String(index+1)]));
  if(data&&typeof data==="object") return Object.entries(data).flatMap(([key,value])=>collectSpecFields(value,section||key,[...path,key]));
  return [];
}

function isSpecField(data){
  return data&&typeof data==="object"&&!Array.isArray(data)&&["value","status","confidence","source","evidence","notes","owner"].some(key=>key in data);
}

function isPrimary(key,data){
  const k=String(key||"").toLowerCase();
  const v=text(data?.value??data).toLowerCase();
  if(["toe_shape","lug_pattern","width_grade"].includes(k)) return false;
  return /_mm$|height|width|drop|spring|shore|hardness|coverage|weight|stack|girth|pitch|depth|ratio|thickness|density|gravity|rebound|compression|tolerance/.test(k)||/\d+(?:\.\d+)?(?:\s*[-~–]\s*\d+(?:\.\d+)?)?\s*(mm|cm|%|shore|g|kg|oz|회|kgf\/cm)\b/.test(v);
}

function metricClass(data){
  const status=String(data?.status||"");
  const confidence=Number(data?.confidence);
  if(status==="detected"||confidence>=0.7) return "good";
  if(status==="external_research"||/coverage|rubber|mesh|color/i.test(text(data?.value??data))) return "info";
  return "";
}

function fieldStatus(data){
  return String(data?.status||data?.source_type||"value");
}

function safeClassName(value){
  return String(value||"value").toLowerCase().replace(/[^a-z0-9_-]+/g,"_").replace(/^_+|_+$/g,"")||"value";
}

function confidenceClass(confidence){
  const value=Number(confidence);
  if(!Number.isFinite(value)) return "mid";
  if(value>=0.66) return "high";
  if(value>=0.45) return "mid";
  return "low";
}

function specPriority(key){
  const order=["heel_midsole_height_mm","forefoot_midsole_height_mm","drop_mm","outsole_toe_lift_mm","toe_spring_mm","heel_spring_mm","lug_height_mm","outsole_thickness","outsole_base_rubber_thickness_mm","outsole_local_pad_thickness_mm","outsole_lug_protrusion_mm","outsole_lug_block_thickness_mm","outsole_groove_depth_mm","forefoot_contact_width_mm","heel_contact_width_mm","toe_box_height_mm","heel_cup_height_mm","instep_girth","ball_girth","bridge_thickness","waist_width_ratio","midsole_hardness_shore_c","outsole_rubber_coverage","target_weight_240mm","width_grade","toe_shape"];
  const index=order.indexOf(key);

}

function compactSpecValue(value,key=""){

async function api(path,options={}){
  if(hasStaticSupabaseConfig()){
    return staticSupabaseApi(path,options);
  }
  const res=await fetch(path,{cache:"no-store",...options});
  if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function hasStaticSupabaseConfig(){
  const config=window.PRODUCTS_RND_VIEWER_SUPABASE||{};
  return Boolean(config.url&&config.anonKey);
}

async function staticSupabaseApi(path,options={}){
  if(options.method&&options.method!=="GET"){
    throw new Error("정적 배포판은 보기 전용입니다.");
  }
  const config=window.PRODUCTS_RND_VIEWER_SUPABASE||{};
  const parsed=new URL(path,window.location.href);
  const headers={
    apikey:config.anonKey,
    Authorization:`Bearer ${config.anonKey}`,
    Accept:"application/json"
  };
  const request=async (table,params)=>{
    const url=`${config.url.replace(/\/$/,"")}/rest/v1/${table}?${params.toString()}`;
    const res=await fetch(url,{headers,cache:"no-store"});
    if(!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return res.json();
  };
  if(parsed.pathname.endsWith("/api/status")){
    return {ok:true,mode:"supabase",can_delete:false,static:true};
  }
  if(parsed.pathname.endsWith("/api/products")){
    const baseSelect="product_id,style,brand,product_name,display_name,color,sku,price,currency,source_url,analysis_count,latest_run_id,latest_run_updated_at,analysis_status,representative_image_url,tags";
    const params=new URLSearchParams({
      select:`${baseSelect},metadata`,
      order:"latest_run_updated_at.desc.nullslast,product_name.asc",
      published:"eq.true"
    });
    const status=parsed.searchParams.get("status")||"";
    if(status) params.set("analysis_status",`eq.${status}`);
    let rawRows;
    try{
      rawRows=await request("product_cards",params);
    }catch(err){
      params.set("select",baseSelect);
      rawRows=await request("product_cards",params);
    }
    let rows=filterDisplayableProducts(normalizeProducts(rawRows));
    const ownership=parsed.searchParams.get("ownership")||"";
    const recentOnly=isTruthyParam(parsed.searchParams.get("recent"));
    if(ownership&&!recentOnly) rows=rows.filter(row=>row.ownership===ownership);
    const needle=(parsed.searchParams.get("q")||"").trim().toLowerCase();
    if(needle) rows=rows.filter(row=>["brand","product_name","display_name","color","sku","ownership_label","category","season","project_code"].map(key=>String(row[key]||"")).join(" ").toLowerCase().includes(needle));
    if(recentOnly) rows=recentProductRows(rows);
    return {products:rows,mode:"supabase"};
  }
  const productRunsMatch=parsed.pathname.match(/\/api\/products\/([^/]+)\/runs$/);
  if(productRunsMatch){
    const productId=decodeURIComponent(productRunsMatch[1]);
    const params=new URLSearchParams({
      select:"run_id,product_id,run_type,analysis_status,created_at,updated_at,json_storage_path",
      product_id:`eq.${productId}`,
      order:"updated_at.desc"
    });
    return {runs:await request("analysis_runs",params),mode:"supabase"};
  }
  const runMatch=parsed.pathname.match(/\/api\/runs\/([^/]+)$/);
  if(runMatch){
    const runId=decodeURIComponent(runMatch[1]);
    const params=new URLSearchParams({
      select:"run_id,product_id,run_type,analysis_status,created_at,updated_at,final_analysis,coverage,analysis_assets(*)",
      run_id:`eq.${runId}`,
      limit:"1"
    });
    const rows=await request("analysis_runs",params);
    if(!rows.length) throw new Error("run not found");
    return {run:{...rows[0],assets:rows[0].analysis_assets||[]},mode:"supabase"};
  }
  throw new Error(`지원하지 않는 정적 API 경로: ${path}`);
}
